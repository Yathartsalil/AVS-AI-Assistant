<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AVS</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--surface3:#22222f;--border:#2a2a3a;--accent:#6366f1;--accent2:#8b5cf6;--accent-glow:rgba(99,102,241,0.15);--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#f1f1f5;--muted:#6b6b80;--muted2:#9999b0;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:"Inter","Segoe UI",system-ui,sans-serif;height:100vh;display:flex;overflow:hidden;}

    /* ── Auth Screen ── */
    #authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
    .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;}
    .auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:white;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
    .auth-logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
    .auth-tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:28px;}
    .auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;transition:all 0.2s;}
    .auth-tab.active{background:var(--accent);color:white;box-shadow:0 2px 10px rgba(99,102,241,0.3);}
    .auth-field{margin-bottom:16px;}
    .auth-field label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:6px;letter-spacing:0.3px;}
    .auth-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;}
    .auth-field input:focus{border-color:rgba(99,102,241,0.5);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
    .auth-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:12px;box-shadow:0 4px 16px rgba(99,102,241,0.3);}
    .auth-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.4);}
    .auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px;}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .google-btn{width:100%;padding:11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;}
    .google-btn:hover{background:var(--surface3);border-color:rgba(99,102,241,0.3);}
    .auth-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none;}
    .auth-error.show{display:block;}

    /* ── App ── */
    #appScreen{display:none;width:100%;height:100vh;flex-direction:row;}
    #appScreen.visible{display:flex;}
    .sidebar{width:268px;min-width:268px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
    .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;box-shadow:0 4px 14px rgba(99,102,241,0.35);}
    .logo-text{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
    .logo-sub{font-size:10px;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-top:1px;}
    .new-chat-btn{margin:12px 12px 8px;padding:10px 14px;background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1));border:1px solid rgba(99,102,241,0.3);border-radius:10px;color:#a5b4fc;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s;}
    .new-chat-btn:hover{background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(139,92,246,0.2));border-color:rgba(99,102,241,0.5);}
    .sidebar-section{padding:12px 16px 6px;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:700;}
    .history-list{flex:1;overflow-y:auto;padding:0 8px 10px;}
    .history-item{padding:10px 12px;font-size:13px;color:var(--muted2);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;margin-bottom:2px;}
    .history-item:hover{background:var(--surface2);color:var(--text);}
    .history-item.active{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1));color:#a5b4fc;border:1px solid rgba(99,102,241,0.2);}
    .history-item-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
    .del-btn{flex-shrink:0;width:20px;height:20px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.15s;}
    .history-item:hover .del-btn{opacity:1;}
    .del-btn:hover{background:rgba(239,68,68,0.15);color:var(--red);}
    .user-strip{margin:0 8px 8px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;gap:10px;}
    .user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;overflow:hidden;}
    .user-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .signout-btn{border:none;background:transparent;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;transition:all 0.15s;flex-shrink:0;}
    .signout-btn:hover{color:var(--red);background:rgba(239,68,68,0.1);}
    .model-strip{margin:0 8px 14px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;}
    .model-strip-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:10px;}
    .model-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted2);}
    .model-row:last-child{margin-bottom:0;}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
    .dot.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
    .dot.blue{background:var(--accent);box-shadow:0 0 8px var(--accent);}
    .model-name{flex:1;font-weight:500;}.model-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,0.06);color:var(--muted);}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .topbar{padding:0 24px;height:58px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .topbar-title{font-size:15px;font-weight:700;letter-spacing:-0.2px;}
    .mode-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.3px;}
    .mode-pill.basic{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
    .mode-pill.image{background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.25);}
    .mode-pill.pro{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.25);}
    .topbar-right{font-size:12px;color:var(--muted);}
    .chat-area{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:20px;}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:var(--muted);text-align:center;padding:40px;margin:auto;}
    .empty-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:white;box-shadow:0 8px 32px rgba(99,102,241,0.3);}
    .empty-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
    .empty-sub{font-size:13px;max-width:380px;line-height:1.8;color:var(--muted2);}
    .suggestion-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
    .chip{padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted2);cursor:pointer;transition:all 0.2s;}
    .chip:hover{border-color:var(--accent);color:#a5b4fc;background:rgba(99,102,241,0.08);}
    .message{display:flex;flex-direction:column;gap:8px;animation:fadeUp 0.25s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .message-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
    .avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;color:white;}
    .avatar.user{background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
    .avatar.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));}
    .bubble{padding:14px 18px;border-radius:12px;border:1px solid var(--border);font-size:14px;line-height:1.8;white-space:pre-wrap;}
    .bubble.user{background:var(--surface2);border-left:3px solid var(--accent);margin-left:36px;}
    .bubble.ai{background:var(--surface);margin-left:36px;}
    .attached-file{display:inline-flex;align-items:center;gap:6px;margin-left:36px;margin-top:4px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--muted2);}
    .sources-toggle{display:flex;align-items:center;gap:6px;margin-left:36px;margin-top:6px;font-size:12px;color:var(--muted);cursor:pointer;width:fit-content;transition:color 0.2s;user-select:none;}
    .sources-toggle:hover{color:var(--accent);}
    .sources-toggle .chevron{transition:transform 0.2s;display:inline-block;}
    .sources-toggle.open .chevron{transform:rotate(180deg);}
    .sources-panel{display:none;margin-left:36px;margin-top:8px;flex-direction:column;gap:8px;}
    .sources-panel.open{display:flex;}
    .source-card{background:#0a0a12;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .source-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;}
    .source-dot{width:8px;height:8px;border-radius:50%;}
    .source-body{padding:12px 14px;font-size:12px;color:var(--muted2);line-height:1.6;max-height:140px;overflow-y:auto;white-space:pre-wrap;}
    .image-wrap{margin-left:36px;margin-top:12px;}
    .image-wrap img{max-width:500px;width:100%;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,0.4);}
    .thinking{display:flex;align-items:center;gap:10px;margin-left:36px;font-size:13px;color:var(--muted);}
    .thinking-dots{display:flex;gap:4px;}
    .thinking-dots span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite;}
    .thinking-dots span:nth-child(2){animation-delay:0.2s;}
    .thinking-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-6px);opacity:1;}}
    .progress-bar{height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 0.4s ease;position:fixed;top:0;left:0;right:0;z-index:9999;}
    .input-wrap{padding:14px 24px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
    .input-box{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;transition:border-color 0.2s;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
    .input-box:focus-within{border-color:rgba(99,102,241,0.5);box-shadow:0 2px 20px rgba(99,102,241,0.1);}
    .input-top{display:flex;align-items:flex-end;gap:10px;}
    .input-box textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;line-height:1.6;resize:none;min-height:24px;max-height:140px;font-family:inherit;}
    .input-box textarea::placeholder{color:var(--muted);}
    .input-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .icon-btn{width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
    .icon-btn:hover{background:var(--surface3);color:var(--text);}
    .send-btn{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:white;box-shadow:0 2px 10px rgba(99,102,241,0.3);}
    .send-btn:hover{opacity:0.9;transform:translateY(-1px);}
    .send-btn:active{transform:scale(0.95);}
    .send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
    .input-bottom{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
    .model-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;padding:5px 10px;cursor:pointer;outline:none;transition:border-color 0.2s;}
    .model-dropdown:hover,.model-dropdown:focus{border-color:rgba(99,102,241,0.4);}
    .model-dropdown option{background:var(--surface2);}
    .input-hint{margin-left:auto;font-size:11px;color:var(--muted);}
    .input-hint kbd{padding:2px 5px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;font-size:10px;}
    .file-preview-bar{display:none;flex-wrap:wrap;gap:8px;padding:8px 0 4px;}
    .file-preview-bar.has-files{display:flex;}
    .file-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted2);max-width:180px;}
    .file-chip-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
    .file-chip-remove{cursor:pointer;color:var(--muted);border:none;background:transparent;padding:0;display:flex;align-items:center;transition:color 0.15s;flex-shrink:0;}
    .file-chip-remove:hover{color:var(--red);}
    #fileInput{display:none;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
    @media(max-width:768px){.sidebar{display:none;}}
  </style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.py,.ts,.html,.css,.cs" onchange="handleFiles(this.files)"/>

<!-- ── Auth Screen ── -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">AVS</div>
      <div class="auth-logo-text">AVS</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-error" id="authError"></div>
    <div id="signinForm">
      <div class="auth-field"><label>Email</label><input type="email" id="siEmail" placeholder="you@example.com"/></div>
      <div class="auth-field"><label>Password</label><input type="password" id="siPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignIn()"/></div>
      <button class="auth-btn" id="signinBtn" onclick="doSignIn()">Sign In</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="auth-field"><label>Name</label><input type="text" id="suName" placeholder="Your name"/></div>
      <div class="auth-field"><label>Email</label><input type="email" id="suEmail" placeholder="you@example.com"/></div>
      <div class="auth-field"><label>Password</label><input type="password" id="suPass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doSignUp()"/></div>
      <button class="auth-btn" id="signupBtn" onclick="doSignUp()">Create Account</button>
    </div>
    <div class="auth-divider">or</div>
    <button class="google-btn" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-3-11.3-7.3l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.6 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- ── App Screen ── -->
<div id="appScreen">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">AVS</div>
      <div><div class="logo-text">AVS</div><div class="logo-sub">Multi-Model AI</div></div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Session
    </button>
    <div class="sidebar-section">History</div>
    <div class="history-list" id="historyList"></div>
    <div class="model-strip">
      <div class="model-strip-title">Active Model</div>
      <div id="modelStripRows"></div>
    </div>
    <div class="user-strip">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">Loading…</div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="signout-btn" onclick="doSignOut()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">AVS</span>
        <div id="topbarPill"></div>
      </div>
      <div class="topbar-right" id="topbarRight"></div>
    </header>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-wrap">
      <div class="input-box">
        <div class="file-preview-bar" id="filePreviewBar"></div>
        <div class="input-top">
          <textarea id="userInput" rows="1" placeholder="Message VS-1…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="send-btn" id="sendBtn" onclick="sendPrompt()" title="Send">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <div class="input-bottom">
          <select class="model-dropdown" id="modelDropdown" onchange="setMode(this.value)">
            <option value="basic">VS-1 — Basic</option>
            <option value="image">VS-G1 — Image</option>
            <option value="pro">VS-2 — Pro</option>
          </select>
          <span class="input-hint"><kbd>Shift</kbd>+<kbd>Enter</kbd> new line &nbsp;·&nbsp; <kbd>Enter</kbd> send</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Firebase init ──
firebase.initializeApp({
  apiKey:"AIzaSyA0-h-MHCfS85w07qom4VrX7gVSqJflBvI",
  authDomain:"avs-c-a7882.firebaseapp.com",
  projectId:"avs-c-a7882",
  storageBucket:"avs-c-a7882.firebasestorage.app",
  messagingSenderId:"969737980686",
  appId:"1:969737980686:web:c5950c9a068ed0531a655f"
});
var auth=firebase.auth();
var db=firebase.firestore();
var currentUser=null;
var SC=1,loading=false,mode='basic',aS=null,attachedFiles=[];
var sessions={};

var MC={
  basic:{lbl:'VS-1',pc:'basic',pi:'&#9679;',sub:'VS-1 answers locally and privately.',models:[{d:'green',n:'VS-1',t:'Basic'}],th:'VS-1 is thinking\u2026'},
  image:{lbl:'VS-G1',pc:'image',pi:'&#10022;',sub:'VS-G1 generates images from your description.',models:[{d:'blue',n:'VS-G1',t:'Image'}],th:'VS-G1 is generating\u2026'},
  pro:{lbl:'VS-2',pc:'pro',pi:'&#9889;',sub:'VS-2 consults multiple models for the best answer.',models:[{d:'yellow',n:'VS-2',t:'Pro'}],th:'VS-2 is thinking\u2026'}
};

// ── Auth tab switching ──
function switchTab(tab){
  document.getElementById('tabSignin').classList.toggle('active',tab==='signin');
  document.getElementById('tabSignup').classList.toggle('active',tab==='signup');
  document.getElementById('signinForm').style.display=tab==='signin'?'block':'none';
  document.getElementById('signupForm').style.display=tab==='signup'?'block':'none';
  hideAuthError();
}
function showAuthError(msg){var e=document.getElementById('authError');e.textContent=msg;e.classList.add('show');}
function hideAuthError(){document.getElementById('authError').classList.remove('show');}
function setBtnLoading(id,on){var b=document.getElementById(id);b.disabled=on;b.textContent=on?'Please wait…':id==='signinBtn'?'Sign In':'Create Account';}

// ── Sign in ──
async function doSignIn(){
  hideAuthError();setBtnLoading('signinBtn',true);
  try{
    await auth.signInWithEmailAndPassword(document.getElementById('siEmail').value.trim(),document.getElementById('siPass').value);
  }catch(e){showAuthError(friendlyError(e));setBtnLoading('signinBtn',false);}
}

// ── Sign up ──
async function doSignUp(){
  hideAuthError();setBtnLoading('signupBtn',true);
  var name=document.getElementById('suName').value.trim();
  var email=document.getElementById('suEmail').value.trim();
  var pass=document.getElementById('suPass').value;
  if(!name){showAuthError('Please enter your name.');setBtnLoading('signupBtn',false);return;}
  try{
    var cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    // Send welcome email via backend
    await fetch('/api/welcome',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,name:name})});
    // Create user doc in Firestore
    await db.collection('users').doc(cred.user.uid).set({name:name,email:email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){showAuthError(friendlyError(e));setBtnLoading('signupBtn',false);}
}

// ── Google OAuth ──
async function doGoogle(){
  hideAuthError();
  try{
    var provider=new firebase.auth.GoogleAuthProvider();
    var result=await auth.signInWithPopup(provider);
    var user=result.user;
    var isNew=result.additionalUserInfo.isNewUser;
    if(isNew){
      await fetch('/api/welcome',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:user.email,name:user.displayName||'there'})});
      await db.collection('users').doc(user.uid).set({name:user.displayName,email:user.email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
  }catch(e){showAuthError(friendlyError(e));}
}

// ── Sign out ──
async function doSignOut(){
  await auth.signOut();
  sessions={};aS=null;
  document.getElementById('historyList').innerHTML='';
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display='flex';
}

function friendlyError(e){
  if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password')return 'Incorrect email or password.';
  if(e.code==='auth/email-already-in-use')return 'An account with this email already exists.';
  if(e.code==='auth/weak-password')return 'Password must be at least 6 characters.';
  if(e.code==='auth/invalid-email')return 'Please enter a valid email address.';
  if(e.code==='auth/popup-closed-by-user')return 'Google sign-in was cancelled.';
  return e.message||'Something went wrong.';
}

// ── Auth state ──
auth.onAuthStateChanged(async function(user){
  if(user){
    currentUser=user;
    document.getElementById('authScreen').style.display='none';
    document.getElementById('appScreen').classList.add('visible');
    document.getElementById('userName').textContent=user.displayName||user.email;
    document.getElementById('userEmail').textContent=user.email;
    var av=document.getElementById('userAvatar');
    if(user.photoURL){av.innerHTML='<img src="'+user.photoURL+'" alt=""/>';}
    else{av.textContent=(user.displayName||user.email||'?')[0].toUpperCase();}
    await loadSessionsFromFirestore();
    setMode('basic');
  }
});

// ── Firestore session management ──
async function loadSessionsFromFirestore(){
  var snap=await db.collection('users').doc(currentUser.uid).collection('sessions').orderBy('updatedAt','desc').limit(30).get();
  document.getElementById('historyList').innerHTML='';
  sessions={};
  if(snap.empty){await createNewSessionInFS();return;}
  var first=true;
  snap.forEach(function(doc){
    var d=doc.data();
    sessions[doc.id]={msgs:d.msgs||[],history:d.history||[]};
    var item=mkItem(d.title||'Session',doc.id);
    if(first){item.classList.add('active');aS=doc.id;first=false;}
    document.getElementById('historyList').appendChild(item);
  });
  if(aS&&sessions[aS]){
    var msgs=sessions[aS].msgs;
    document.getElementById('chatArea').innerHTML=msgs.length===0?buildES():msgs.join('');
  }
}

async function createNewSessionInFS(){
  var title='Session '+String(++SC).padStart(3,'0');
  var ref=await db.collection('users').doc(currentUser.uid).collection('sessions').add({
    title:title,msgs:[],history:[],createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  sessions[ref.id]={msgs:[],history:[]};
  aS=ref.id;
  var item=mkItem(title,ref.id);item.classList.add('active');
  document.getElementById('historyList').prepend(item);
  document.getElementById('chatArea').innerHTML=buildES();
  updateUI();
}

async function saveSessionToFS(){
  if(!aS||!currentUser)return;
  var s=sessions[aS];
  // Build title from first user message
  var title='New Session';
  for(var i=0;i<s.history.length;i++){
    if(s.history[i].role==='User'){
      title=s.history[i].content.substring(0,40)+(s.history[i].content.length>40?'…':'');
      break;
    }
  }
  await db.collection('users').doc(currentUser.uid).collection('sessions').doc(aS).set({
    title:title,
    msgs:s.msgs.slice(-60),
    history:s.history.slice(-40),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});
  // Update sidebar label
  var item=document.querySelector('.history-item[data-session="'+aS+'"] .history-item-label');
  if(item)item.textContent=title;
}

async function deleteSessionFromFS(id){
  await db.collection('users').doc(currentUser.uid).collection('sessions').doc(id).delete();
}

// ── UI helpers ──
function setMode(m){
  mode=m;
  document.getElementById('modelDropdown').value=m;
  updateUI();
  document.getElementById('userInput').placeholder='Message '+MC[m].lbl+'\u2026';
}
function updateUI(){
  var c=MC[mode];
  document.getElementById('topbarPill').innerHTML='<div class="mode-pill '+c.pc+'">'+c.pi+' '+c.lbl+'</div>';
  var pill=document.getElementById('emptyModePill'),sub=document.getElementById('emptySub');
  if(pill)pill.innerHTML='<div class="mode-pill '+c.pc+'">'+c.pi+' '+c.lbl+'</div>';
  if(sub)sub.textContent=c.sub;
  document.getElementById('modelStripRows').innerHTML=c.models.map(function(m){
    return '<div class="model-row"><div class="dot '+m.d+'"></div><span class="model-name">'+m.n+'</span><span class="model-tag">'+m.t+'</span></div>';
  }).join('');
  var cnt=aS&&sessions[aS]?sessions[aS].history.length:0;
  document.getElementById('topbarRight').textContent=cnt>0?cnt+' message'+(cnt!==1?'s':'')+' in memory':'';
}
function buildES(){
  var c=MC[mode];
  return '<div class="empty-state" id="emptyState"><div class="empty-icon">AVS</div><div class="empty-title">What can I help with?</div><div id="emptyModePill"><div class="mode-pill '+c.pc+'">'+c.pi+' '+c.lbl+'</div></div><div class="empty-sub" id="emptySub">'+c.sub+'</div><div class="suggestion-chips"><div class="chip" onclick="useChip(this)">What is quantum entanglement?</div><div class="chip" onclick="useChip(this)">Explain the Russia-Ukraine conflict</div><div class="chip" onclick="useChip(this)">Generate an image of a futuristic city</div><div class="chip" onclick="useChip(this)">Best practices for system design</div></div></div>';
}
function mkItem(lbl,id){
  var el=document.createElement('div');el.className='history-item';el.dataset.session=id;
  el.innerHTML='<span class="history-item-label">'+esc(lbl)+'</span><button class="del-btn" onclick="deleteChat(event,this)" title="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>';
  el.addEventListener('click',function(e){if(!e.target.closest('.del-btn'))swSess(id,el);});
  return el;
}

// ── Session actions ──
function newChat(){createNewSessionInFS();}
function swSess(id,el){
  document.querySelectorAll('.history-item').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');aS=id;
  if(!sessions[id])sessions[id]={msgs:[],history:[]};
  var msgs=sessions[id].msgs;
  document.getElementById('chatArea').innerHTML=msgs.length===0?buildES():msgs.join('');
  updateUI();
}
async function deleteChat(ev,btn){
  ev.stopPropagation();
  var it=btn.closest('.history-item'),id=it.dataset.session,wa=it.classList.contains('active');
  delete sessions[id];it.remove();
  await deleteSessionFromFS(id);
  if(wa){
    var r=document.querySelectorAll('.history-item');
    if(r.length>0){swSess(r[0].dataset.session,r[0]);}
    else{createNewSessionInFS();}
  }
}

// ── File handling ──
function handleFiles(files){
  for(var i=0;i<files.length;i++)attachedFiles.push(files[i]);
  renderFilePreviews();document.getElementById('fileInput').value='';
}
function renderFilePreviews(){
  var bar=document.getElementById('filePreviewBar');
  if(!attachedFiles.length){bar.classList.remove('has-files');bar.innerHTML='';return;}
  bar.classList.add('has-files');
  bar.innerHTML=attachedFiles.map(function(f,i){
    return '<div class="file-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="file-chip-name">'+esc(f.name)+'</span><button class="file-chip-remove" onclick="removeFile('+i+')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
  }).join('');
}
function removeFile(i){attachedFiles.splice(i,1);renderFilePreviews();}
async function readFileAsText(file){
  return new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){res(e.target.result);};
    if(file.type.startsWith('image/')){r.readAsDataURL(file);}else{r.readAsText(file);}
  });
}

// ── Input ──
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendPrompt();}}
function useChip(el){var i=document.getElementById('userInput');i.value=el.innerText;autoResize(i);sendPrompt();}
function setProgress(p){document.getElementById('progressBar').style.width=p+'%';}

async function sendPrompt(){
  if(loading)return;
  var inp=document.getElementById('userInput'),pr=inp.value.trim();
  if(!pr&&!attachedFiles.length)return;
  loading=true;document.getElementById('sendBtn').disabled=true;
  var filesSnap=attachedFiles.slice();attachedFiles=[];renderFilePreviews();
  inp.value='';inp.style.height='auto';
  var em=document.getElementById('emptyState');if(em)em.remove();
  var fileContents=[];
  for(var i=0;i<filesSnap.length;i++){
    var fc=await readFileAsText(filesSnap[i]);
    fileContents.push({name:filesSnap[i].name,type:filesSnap[i].type,content:fc});
  }
  appUser(pr,filesSnap);
  var tid=appThink();setProgress(30);
  var history=aS&&sessions[aS]?sessions[aS].history:[];
  var ctx=history.length>0?'Previous conversation:\n'+history.map(function(h){return h.role+': '+h.content;}).join('\n')+'\n\nNow answer:\n':'';
  var fileCtx='';
  for(var j=0;j<fileContents.length;j++){
    var f2=fileContents[j];
    fileCtx+=f2.type.startsWith('image/')?'\n[User attached image: '+f2.name+']\n':'\n[File: '+f2.name+']\n'+f2.content.substring(0,4000)+'\n';
  }
  var fullPrompt=ctx+fileCtx+(pr||'Describe the attached file(s).');
  try{
    setProgress(60);
    var res=await fetch('/api/prompt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:fullPrompt,mode:mode})});
    if(!res.ok)throw new Error('Server error: '+res.status);
    var data = await res.json();
remThink(tid);

// 🔹 Intercept VS-1 responses
if (mode === 'basic') {

  var vs1Message = "Thank you for using this model, at AVS we constantly upgrade, renew and improve our models to align with the fast-paced world. Currently we are doing the same with model VS-1. Please consider using the other models which are used for enhanced and comprehensive answers, meaning they are more advanced than this one. Thank you for your cooperation.";

  appAI({
    finalAnswer: vs1Message,
    sources: null,
    imageBase64: null
  });

  if(!sessions[aS]) sessions[aS] = {msgs:[], history:[]};

  sessions[aS].history.push({
    role:'User',
    content: pr + (filesSnap.length ? ' [+'+filesSnap.length+' file(s)]' : '')
  });

  sessions[aS].history.push({
    role:'AVS',
    content: vs1Message
  });

} else {

  // 🔹 Normal behavior for other models
  appAI(data);

  if(!sessions[aS]) sessions[aS]={msgs:[],history:[]};

  sessions[aS].history.push({
    role:'User',
    content: pr + (filesSnap.length ? ' [+'+filesSnap.length+' file(s)]' : '')
  });

  sessions[aS].history.push({
    role:'AVS',
    content: data.finalAnswer
  });
}
    if(sessions[aS].history.length>40)sessions[aS].history=sessions[aS].history.slice(-40);
    await saveSessionToFS();
    updateUI();
  }catch(err){remThink(tid);appErr('Error: '+err.message);}
  setProgress(100);setTimeout(function(){setProgress(0);},600);
  loading=false;document.getElementById('sendBtn').disabled=false;
}

function saveSessMsg(html){if(!sessions[aS])sessions[aS]={msgs:[],history:[]};sessions[aS].msgs.push(html);}
function appUser(txt,files){
  var ca=document.getElementById('chatArea'),el=document.createElement('div');el.className='message';
  var fh=files.map(function(f){return '<div class="attached-file"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+esc(f.name)+'</div>';}).join('');
  el.innerHTML='<div class="message-meta"><div class="avatar user">U</div><span>You</span></div>'+(txt?'<div class="bubble user">'+esc(txt)+'</div>':'')+fh;
  document.getElementById('chatArea').appendChild(el);sb();saveSessMsg(el.outerHTML);
}
function appThink(){
  var id='t'+Date.now(),ca=document.getElementById('chatArea'),el=document.createElement('div'),c=MC[mode];
  el.className='message';el.id=id;
  el.innerHTML='<div class="message-meta"><div class="avatar ai">AVS</div><span>'+c.lbl+'</span></div><div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div><span>'+c.th+'</span></div>';
  ca.appendChild(el);sb();return id;
}
function remThink(id){var el=document.getElementById(id);if(el)el.remove();}
function appAI(data){
  var ca=document.getElementById('chatArea'),el=document.createElement('div');el.className='message';
  var sh='';
  if(data.sources&&Object.keys(data.sources).length>1){
    var tid='tg'+Date.now(),pid='pn'+Date.now(),cards='';
    var colors={'VS-1':'#10b981','VS-G1':'#8b5cf6','VS-2':'#f59e0b'};
    for(var k in data.sources){var v=data.sources[k],c=colors[k]||'#94a3b8';cards+='<div class="source-card"><div class="source-header"><div class="source-dot" style="background:'+c+';box-shadow:0 0 6px '+c+'40"></div><span>'+esc(k)+'</span></div><div class="source-body">'+esc(v||'(no response)')+'</div></div>';}
    sh='<div class="sources-toggle" id="'+tid+'" onclick="tgSrc(\''+tid+'\',\''+pid+'\')"><span class="chevron">&#9662;</span> View individual responses</div><div class="sources-panel" id="'+pid+'">'+cards+'</div>';
  }
  var ih=data.imageBase64?'<div class="image-wrap"><img src="data:image/jpeg;base64,'+data.imageBase64+'" alt="Generated"/></div>':'';
  var lbl=MC[mode].lbl+' \u2014 '+(mode==='image'?'Generated Image':mode==='pro'?'Synthesized Answer':'Answer');
  el.innerHTML='<div class="message-meta"><div class="avatar ai">AVS</div><span>'+lbl+'</span></div><div class="bubble ai">'+esc(data.finalAnswer)+'</div>'+sh+ih;
  ca.appendChild(el);sb();saveSessMsg(el.outerHTML);
}
function appErr(msg){
  var ca=document.getElementById('chatArea'),el=document.createElement('div');el.className='message';
  el.innerHTML='<div class="message-meta"><div class="avatar ai" style="background:#ef4444">!</div><span style="color:#ef4444">Error</span></div><div class="bubble ai" style="border-color:rgba(239,68,68,0.3);color:#fca5a5">'+esc(msg)+'</div>';
  ca.appendChild(el);sb();
}
function tgSrc(t,p){document.getElementById(t).classList.toggle('open');document.getElementById(p).classList.toggle('open');}
function sb(){var c=document.getElementById('chatArea');c.scrollTop=c.scrollHeight;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
